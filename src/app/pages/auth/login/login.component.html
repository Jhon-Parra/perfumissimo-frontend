<div class="min-h-screen flex items-center justify-center bg-[#F9F9F6] px-4">
    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-[#ecece5]">
        <div class="text-center mb-8">
            <h1 class="font-serif text-3xl tracking-widest text-charcoal mb-2">PERFUMISSIMO</h1>
            <p class="text-sm font-light text-soft-charcoal uppercase tracking-widest">
                {{ isLoginMode ? 'Panel de Acceso' : 'Crea tu Cuenta' }}
            </p>
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-6" autocomplete="off">
            <div *ngIf="errorMsg" class="bg-red-50 text-red-500 text-sm p-3 rounded-md text-center">
                {{ errorMsg }}
            </div>

            <!-- Campos exclusivos de Registro -->
            <ng-container *ngIf="!isLoginMode">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="nombre"
                            class="block text-xs font-bold text-soft-charcoal uppercase tracking-widest mb-2">Nombre</label>
                        <input type="text" id="nombre" name="nombre" [(ngModel)]="registerData.nombre" required
                            class="w-full border border-[#dcdcd4] rounded-sm p-3 text-sm focus:outline-none focus:border-gold transition-colors"
                            placeholder="Tu nombre">
                    </div>
                    <div>
                        <label for="apellido"
                            class="block text-xs font-bold text-soft-charcoal uppercase tracking-widest mb-2">Apellido</label>
                        <input type="text" id="apellido" name="apellido" [(ngModel)]="registerData.apellido" required
                            class="w-full border border-[#dcdcd4] rounded-sm p-3 text-sm focus:outline-none focus:border-gold transition-colors"
                            placeholder="Tu apellido">
                    </div>
                </div>

                <div>
                    <label for="telefono"
                        class="block text-xs font-bold text-soft-charcoal uppercase tracking-widest mb-2">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" [(ngModel)]="registerData.telefono" required
                        class="w-full border border-[#dcdcd4] rounded-sm p-3 text-sm focus:outline-none focus:border-gold transition-colors"
                        placeholder="+57 300 000 0000">
                </div>
            </ng-container>

            <!-- Campo de Email para ambos -->
            <div>
                <label for="email"
                    class="block text-xs font-bold text-soft-charcoal uppercase tracking-widest mb-2">Correo
                    Electrónico</label>
                <!-- Email para login -->
                <input *ngIf="isLoginMode" type="email" id="email_login" name="email_login"
                    [(ngModel)]="credentials.email" required autocomplete="new-password"
                    class="w-full border border-[#dcdcd4] rounded-sm p-3 text-sm focus:outline-none focus:border-gold transition-colors"
                    placeholder="usuario@perfumissimo.com">
                <!-- Email para registro -->
                <input *ngIf="!isLoginMode" type="email" id="email_reg" name="email_reg"
                    [(ngModel)]="registerData.email" required
                    class="w-full border border-[#dcdcd4] rounded-sm p-3 text-sm focus:outline-none focus:border-gold transition-colors"
                    placeholder="usuario@perfumissimo.com">
            </div>

            <!-- Campo Password para ambos -->
            <div>
                <label for="password"
                    class="block text-xs font-bold text-soft-charcoal uppercase tracking-widest mb-2">Contraseña</label>
                <!-- Password para login -->
                <input *ngIf="isLoginMode" type="password" id="password_login" name="password_login"
                    [(ngModel)]="credentials.password" required autocomplete="new-password"
                    class="w-full border border-[#dcdcd4] rounded-sm p-3 text-sm focus:outline-none focus:border-gold transition-colors"
                    placeholder="••••••••">
                <!-- Password para registro -->
                <input *ngIf="!isLoginMode" type="password" id="password_reg" name="password_reg"
                    [(ngModel)]="registerData.password" required
                    class="w-full border border-[#dcdcd4] rounded-sm p-3 text-sm focus:outline-none focus:border-gold transition-colors"
                    placeholder="••••••••">
            </div>

            <button type="submit" [disabled]="!loginForm.form.valid || isLoading"
                class="w-full btn-primary px-4 py-3 bg-charcoal text-white tracking-widest uppercase text-sm font-bold shadow-md hover:bg-black transition-all disabled:opacity-50 flex justify-center items-center">
                <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                {{ isLoading ? 'Procesando...' : (isLoginMode ? 'Iniciar Sesión' : 'Registrarme') }}
            </button>
        </form>

        <div class="mt-6 flex items-center justify-center space-x-2">
            <span class="h-px bg-gray-200 w-full"></span>
            <span class="text-xs text-soft-charcoal uppercase tracking-widest font-bold px-2 whitespace-nowrap">O
                continuar con</span>
            <span class="h-px bg-gray-200 w-full"></span>
        </div>

        <div class="mt-6 w-full flex justify-center">
            <div id="google-btn"></div>
        </div>

        <div class="mt-8 text-center space-y-4">
            <button type="button" (click)="switchMode()"
                class="text-xs text-charcoal font-bold tracking-widest uppercase hover:text-gold transition-colors flex items-center justify-center w-full">
                {{ isLoginMode ? '¿No tienes cuenta? Regístrate aquí' : '¿Ya tienes cuenta? Inicia Sesión' }}
            </button>

            <a routerLink="/"
                class="text-xs text-soft-charcoal hover:text-gold transition-colors flex items-center justify-center w-full">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Volver a la Tienda
            </a>
        </div>
    </div>
</div>
