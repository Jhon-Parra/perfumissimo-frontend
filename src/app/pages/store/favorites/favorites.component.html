<main class="min-h-screen bg-cream pt-24 pb-16">
    <div class="container mx-auto px-4 max-w-7xl">
        <header class="text-center mb-12">
            <h1 class="font-serif text-4xl md:text-5xl text-charcoal mb-4">Tus Favoritos</h1>
            <p class="text-soft-charcoal font-sans tracking-wide">Colección personal de fragancias seleccionadas</p>
        </header>

        <!-- No Favorites State -->
        <div *ngIf="favoriteProducts.length === 0" class="flex flex-col items-center justify-center py-20 text-center">
            <svg class="w-16 h-16 text-gray-300 mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z">
                </path>
            </svg>
            <h3 class="font-serif text-2xl text-charcoal mb-4">Aún no tienes perfumes favoritos</h3>
            <p class="text-soft-charcoal mb-8">Descubre nuestra colección y guarda las fragancias que más te gusten.</p>
            <a routerLink="/catalog"
                class="bg-charcoal text-white px-8 py-3 rounded-none font-sans uppercase tracking-widest text-sm hover:bg-gold transition-colors duration-300 inline-block">
                Explorar Catálogo
            </a>
        </div>

        <!-- Favorites Grid -->
        <div *ngIf="favoriteProducts.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <app-product-card *ngFor="let product of favoriteProducts" [product]="product"></app-product-card>
        </div>
    </div>
</main>
