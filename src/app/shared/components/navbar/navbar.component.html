<div class="w-full bg-cream text-charcoal font-sans">
  <!-- Top Banner -->
  <div *ngIf="settings?.show_banner"
    class="w-full bg-[#f2f2ef] py-2 flex justify-center items-center text-xs tracking-wider border-b border-[#e5e5e0]">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 text-sage" fill="none" viewBox="0 0 24 24"
      stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
    </svg>
    {{ settings?.banner_text || 'ENVÍO GRATIS EN PEDIDOS SUPERIORES A $50' }}
  </div>

  <!-- Navbar Main -->
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">

      <!-- Logo -->
      <!-- Logo -->
      <a routerLink="/"
        class="flex-shrink-0 flex items-center cursor-pointer transition-transform hover:scale-110 duration-300">

        <img src="assets/images/logo.png" alt="Perfumissimo Perfumería de Lujo"
          class="h-20 sm:h-50 md:h-50 lg:h-32 xl:h-36 w-auto object-contain py-1 transition-all duration-300" />

      </a>

      <!-- Center Links (Desktop) -->
      <div class="hidden md:flex space-x-8 items-center pt-1">
        <a routerLink="/"
          class="text-charcoal hover:text-gold transition-colors duration-200 text-sm font-medium tracking-widest border-b-2 border-charcoal pb-1">INICIO</a>
        <a routerLink="/catalog"
          class="text-charcoal hover:text-gold transition-colors duration-200 text-sm font-medium tracking-widest border-b-2 border-transparent pb-1 hover:border-gold">CATÁLOGO</a>
        <a routerLink="/contact"
          class="text-charcoal hover:text-gold transition-colors duration-200 text-sm font-medium tracking-widest border-b-2 border-transparent pb-1 hover:border-gold">CONTACTO</a>
      </div>

      <!-- Icons (Right) -->
      <div class="flex items-center space-x-6">
        <button class="text-charcoal hover:text-gold transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"></path>
          </svg>
        </button>

        <!-- Logged In View -->
        <ng-container *ngIf="authService.isAuthenticated(); else loggedOut">
          <div class="relative group">
            <button class="text-charcoal hover:text-gold transition-colors flex items-center">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z">
                </path>
              </svg>
            </button>
            <div
              class="absolute right-0 mt-2 w-48 bg-white border border-gray-100 rounded-md shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
              <div class="py-1">
                <a routerLink="/admin" *ngIf="authService.getUserRole() === 'ADMIN'"
                  class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Panel Admin</a>
                <button (click)="logout()"
                  class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100">Cerrar Sesión</button>
              </div>
            </div>
          </div>
        </ng-container>

        <!-- Guest View -->
        <ng-template #loggedOut>
          <a routerLink="/login" class="text-charcoal hover:text-gold transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z">
              </path>
            </svg>
          </a>
        </ng-template>

        <button class="text-charcoal hover:text-gold transition-colors flex items-center relative">
          <span class="mr-1 text-xs uppercase tracking-wider hidden sm:block">Favoritos</span>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z">
            </path>
          </svg>
          <span
            class="absolute -top-1.5 -right-2 bg-sage text-white text-[10px] rounded-full h-4 w-4 flex items-center justify-center font-bold">0</span>
        </button>
        <!-- Cart -->
        <a routerLink="/checkout" class="flex flex-col items-center hover:text-gold transition-colors relative group">
          <div class="relative">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
            </svg>
            <span *ngIf="(cartItemCount$ | async) as count"
              class="absolute -top-2 -right-2 bg-[#C2A878] text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">
              {{ count }}
            </span>
          </div>
          <span class="text-[10px] mt-1 hidden lg:block tracking-widest">CARRITO</span>
        </a>
      </div>

    </div>
  </nav>
</div>
