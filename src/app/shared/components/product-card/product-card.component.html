<div class="bg-[#ecece5] product-card border border-transparent p-4 pb-6 group cursor-pointer w-full relative">
    <!-- Badges -->
    <div class="absolute top-4 left-4 z-10">
        <span class="bg-gold text-white text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-sm shadow-sm"
            *ngIf="product.isNew">NUEVO</span>
    </div>
    <div
        class="absolute top-4 right-4 z-10 w-8 h-8 bg-white/70 backdrop-blur-sm rounded-full flex items-center justify-center hover:bg-white hover:text-gold transition-colors shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z">
            </path>
        </svg>
    </div>

    <!-- Image -->
    <div class="relative w-full aspect-[4/5] bg-transparent flex items-center justify-center overflow-hidden mb-6">
        <div class="absolute inset-x-0 bottom-0 h-1/3 bg-gradient-to-t from-black/5 to-transparent mix-blend-multiply">
        </div>
        <img [src]="product.imageUrl" [alt]="product.name"
            class="object-contain h-5/6 max-w-[80%] transition-transform duration-700 group-hover:scale-105 filter drop-shadow-xl" />
    </div>

    <!-- Info -->
    <div class="text-center flex flex-col flex-grow items-center">
        <!-- Renderizar género si aplica, de lo contrario Unisex -->
        <span class="text-[9px] px-2 py-0.5 mb-2 rounded-full border tracking-widest uppercase font-bold" [ngClass]="{
                  'bg-pink-50 text-pink-600 border-pink-100': product.genero === 'mujer',
                  'bg-blue-50 text-blue-600 border-blue-100': product.genero === 'hombre',
                  'bg-gray-100 text-gray-500 border-gray-200': product.genero === 'unisex' || !product.genero
              }">
            {{ product.genero ? (product.genero === 'mujer' ? 'Para Mujer' : (product.genero === 'hombre' ? 'Para
            Hombre' : 'Unisex')) : 'Unisex' }}
        </span>

        <h3 class="font-sans font-bold text-charcoal text-sm uppercase tracking-widest mb-1">{{ product.name }}</h3>
        <p class="text-[11px] text-soft-charcoal mb-2 font-medium">Notas: {{ product.notes }}</p>
        <p class="font-serif font-bold text-lg text-charcoal mb-3">{{ product.price | currency }}</p>

        <!-- Social Proof Badge -->
        <div
            class="flex items-center justify-center border border-sage/50 bg-[#F4F5F0] rounded-full px-3 py-1 mb-4 shadow-sm">
            <span class="text-gold mr-1 text-xs">✨</span>
            <span class="text-[10px] text-sage font-semibold tracking-wide">Más de {{ product.soldCount }} unidades
                vendidas</span>
        </div>

        <!-- Add to Cart Button -->
        <button (click)="addToCart()"
            class="w-full btn-secondary mt-2 px-4 py-3 text-xs tracking-widest uppercase transition-all duration-300">
            Añadir al Carrito
        </button>
    </div>
</div>
